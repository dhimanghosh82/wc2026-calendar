name: Update FIFA WC 2026 Calendar

on:
  schedule:
    # Every 15 min during match hours (16:00–03:00 UTC = noon–11pm ET)
    - cron: "*/15 16-23 * * *"
    - cron: "*/15 0-3 * * *"
    # Every 3 hours outside match hours (quiet period)
    - cron: "0 4-15 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytz

      - name: Generate ICS
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python generate_ics.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FIFA_WorldCup2026.ics
          git diff --cached --quiet || git commit -m "🔄 Auto-update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
